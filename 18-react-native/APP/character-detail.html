<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="js/script.js" defer></script>
    <title>Ver personaje | GTA Generations</title>
</head>

<body>
    <div class="phone dashboard-screen character-detail-screen">
        <div class="dashboard-bg" aria-hidden="true"></div>

        <header class="character-detail-header">
            <a id="backBtn" href="characters.html" aria-label="Volver a personajes">
                <i class="ph ph-arrow-circle-left"></i>
            </a>
            <button id="characterDetailMenuBtn" class="game-detail-menu" type="button" aria-label="Opciones del personaje">
                <i class="ph ph-dots-three-vertical"></i>
            </button>
            <div id="characterDetailOptions" class="game-detail-options">
                <button type="button" data-character-action="edit">Editar</button>
                <button type="button" data-character-action="delete">Eliminar</button>
            </div>
        </header>

        <main id="characterDetailContent" class="character-detail-content"></main>

        <nav class="dashboard-nav" aria-label="Navegación principal">
            <button class="nav-item" type="button" data-page="dashboard.html" aria-label="Dashboard">
                <i class="ph ph-squares-four"></i>
            </button>
            <button class="nav-item" type="button" data-page="generations.html" aria-label="Generaciones">
                <i class="ph ph-tree-structure"></i>
            </button>
            <button class="nav-item" type="button" data-page="profile.html" aria-label="Perfil">
                <i class="ph ph-user-circle"></i>
            </button>
            <button class="nav-item" type="button" data-page="games.html" aria-label="Juegos">
                <i class="ph ph-game-controller"></i>
            </button>
            <button class="nav-item active" type="button" data-page="characters.html" aria-label="Personajes">
                <i class="ph ph-users"></i>
            </button>
        </nav>
    </div>
</body>

</html>
