<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="js/script.js" defer></script>
    <title>Perfil | GTA Generations</title>
</head>

<body>
    <div class="phone dashboard-screen profile-screen">
        <div class="dashboard-bg" aria-hidden="true"></div>

        <main class="profile-content">
            <h1 class="dashboard-title profile-title font-pricedown">Perfil</h1>

            <section class="profile-hero" aria-label="Usuario actual">
                <img class="profile-avatar" src="img/photo.jpg" alt="Avatar de usuario">
                <h2 class="font-post profile-name">Juan Machete</h2>
            </section>

            <section class="profile-panel" aria-label="Información de la cuenta">
                <h2 class="profile-panel-title font-pricedown">Información de la cuenta</h2>

                <div class="profile-info-row">
                    <span class="profile-info-icon"><i class="ph ph-user-square"></i></span>
                    <div>
                        <strong>Usuario</strong>
                        <p>JuanKillero2</p>
                    </div>
                </div>

                <div class="profile-info-row">
                    <span class="profile-info-icon"><i class="ph ph-envelope-simple"></i></span>
                    <div>
                        <strong>Email</strong>
                        <p>juan02@mail.com</p>
                    </div>
                </div>

                <button class="profile-link-row font-pricedown" type="button" data-page="edit-profile.html">
                    Editar perfil
                    <span class="profile-row-arrow"><i class="ph ph-caret-right"></i></span>
                </button>
            </section>

            <section class="profile-panel" aria-label="Acciones de perfil">
                <h2 class="profile-panel-title font-pricedown">Acciones</h2>

                <button class="profile-action-row" type="button" data-page="change-password.html">
                    <span class="profile-info-icon"><i class="ph ph-lock-key"></i></span>
                    <span>Cambiar Contraseña</span>
                    <span class="profile-row-arrow"><i class="ph ph-caret-right"></i></span>
                </button>

                <button id="logoutBtn" class="profile-action-row" type="button">
                    <span class="profile-info-icon"><i class="ph ph-sign-out"></i></span>
                    <span>Cerrar Sesión</span>
                </button>
            </section>
        </main>

        <nav class="dashboard-nav" aria-label="Navegación principal">
            <button class="nav-item" type="button" data-page="dashboard.html" aria-label="Dashboard">
                <i class="ph ph-squares-four"></i>
            </button>
            <button class="nav-item" type="button" data-page="generations.html" aria-label="Generaciones">
                <i class="ph ph-tree-structure"></i>
            </button>
            <button class="nav-item active" type="button" data-page="profile.html" aria-label="Perfil">
                <i class="ph ph-user-circle"></i>
            </button>
            <button class="nav-item" type="button" data-page="games.html" aria-label="Juegos">
                <i class="ph ph-game-controller"></i>
            </button>
            <button class="nav-item" type="button" data-page="characters.html" aria-label="Personajes">
                <i class="ph ph-users"></i>
            </button>
        </nav>
    </div>
</body>

</html>
