<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="js/script.js" defer></script>
    <title>Cambiar contraseña | GTA Generations</title>
</head>

<body>
    <div class="phone dashboard-screen profile-screen password-screen">
        <div class="dashboard-bg" aria-hidden="true"></div>

        <header class="profile-header">
            <a id="backBtn" href="profile.html" aria-label="Volver al perfil">
                <i class="ph ph-arrow-circle-left"></i>
            </a>
        </header>

        <main class="profile-content password-content">
            <h1 class="dashboard-title profile-title font-pricedown">Cambiar contraseña</h1>

            <div class="password-symbol" aria-hidden="true">
                <i class="ph ph-fingerprint"></i>
            </div>

            <form id="changePasswordForm" class="profile-form password-form">
                <label for="newPassword">Ingresar nueva contraseña:</label>
                <div class="profile-input-icon">
                    <i class="ph ph-lock-key"></i>
                    <input id="newPassword" type="password" placeholder="Nueva contraseña">
                </div>

                <label for="confirmPassword">Ingresarla nuevamente:</label>
                <div class="profile-input-icon">
                    <i class="ph ph-lock-key"></i>
                    <input id="confirmPassword" type="password" placeholder="Confirmar Contraseña">
                </div>

                <button class="profile-save-btn font-pricedown" type="submit">Actualizar contraseña</button>
            </form>
        </main>

        <nav class="dashboard-nav" aria-label="Navegación principal">
            <button class="nav-item" type="button" data-page="dashboard.html" aria-label="Dashboard">
                <i class="ph ph-squares-four"></i>
            </button>
            <button class="nav-item" type="button" data-page="generations.html" aria-label="Generaciones">
                <i class="ph ph-tree-structure"></i>
            </button>
            <button class="nav-item active" type="button" data-page="profile.html" aria-label="Perfil">
                <i class="ph ph-user-circle"></i>
            </button>
            <button class="nav-item" type="button" data-page="games.html" aria-label="Juegos">
                <i class="ph ph-game-controller"></i>
            </button>
            <button class="nav-item" type="button" data-page="characters.html" aria-label="Personajes">
                <i class="ph ph-users"></i>
            </button>
        </nav>
    </div>
</body>

</html>
