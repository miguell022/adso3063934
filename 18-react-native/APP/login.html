<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="js/script.js" defer></script>
    <title>Login | GTA Generations</title>
</head>

<body>
    <div class="phone login-screen">

        <!-- Mismo fondo animado del welcome -->
        <div class="gta-bg" aria-hidden="true">
            <img class="bg-logo logo-1" src="img/gtaIII.png" alt="">
            <img class="bg-logo logo-2" src="img/gtaViceCity.png" alt="">
            <img class="bg-logo logo-3" src="img/gtaSanAndreasLogo.png" alt="">
            <img class="bg-logo logo-4" src="img/gtaV.png" alt="">
            <img class="bg-logo logo-5" src="img/gtaIV.png" alt="">
            <img class="bg-logo logo-6" src="img/GtaLibertyCity.png" alt="">
            <img class="bg-logo logo-7" src="img/GtaOriginal.png" alt="">
        </div>

        <div class="logo-layer layer-fast" aria-hidden="true">
            <img class="bg-logo logo-8" src="img/GtaChinaTown.png" alt="">
            <img class="bg-logo logo-9" src="img/GtaViceCityStories.png" alt="">
            <img class="bg-logo logo-10" src="img/GtaOnline.png" alt="">
            <img class="bg-logo logo-11" src="img/GtaOriginal.png" alt="">
            <img class="bg-logo logo-12" src="img/GtaVI.png" alt="">
            <img class="bg-logo logo-13" src="img/GtaLibertyCity.png" alt="">
            <img class="bg-logo logo-14" src="img/gtaSanAndreasLogo.png" alt="">
        </div>

        <header class="login-header">
            <a id="backBtn" href="layout.html" aria-label="Volver al welcome">
                <i class="ph ph-arrow-circle-left"></i>
            </a>
        </header>

        <main class="login-content">
            <img class="rockstar-logo" src="img/rockstarLogo.png" alt="Rockstar Games">

            <form id="loginForm" class="auth-form">
                <div class="auth-heading">
                    <span>Player Access</span>
                    <i class="ph ph-game-controller"></i>
                </div>
                <label for="username">Email/User:</label>
                <div class="input-group">
                    <i class="ph ph-user"></i>
                    <input id="username" name="username" type="text" autocomplete="username" placeholder="Ingresa tu usuario" required>
                </div>

                <label for="password">Password:</label>
                <div class="input-group">
                    <i class="ph ph-lock-key"></i>
                    <input id="password" name="password" type="password" autocomplete="current-password" placeholder="Ingresa tu contraseña" required>
                    <button id="togglePassword" class="toggle-password" type="button" aria-label="Mostrar contraseña">
                        <i class="ph ph-eye"></i>
                    </button>
                </div>

                <button class="auth-submit" type="submit">
                    <span class="coin-icon">$</span>
                    Login
                </button>
            </form>
        </main>

        <footer>
            <button id="loginBtn" class="active" type="button">Login</button>
            <button id="registerBtn" type="button">Register</button>
        </footer>
    </div>
</body>

</html>
