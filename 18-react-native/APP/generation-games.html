<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="CSS/style.css">
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
    <script src="js/script.js" defer></script>
    <title>Juegos por generación | GTA Generations</title>
</head>

<body>
    <div class="phone dashboard-screen generation-games-screen">
        <div class="dashboard-bg" aria-hidden="true"></div>

        <header class="generation-games-header">
            <a id="backBtn" href="generations.html" aria-label="Volver a generaciones">
                <i class="ph ph-arrow-circle-left"></i>
            </a>
        </header>

        <main class="generation-games-content">
            <h1 id="generationGamesTitle" class="dashboard-title generation-games-title font-pricedown">Juegos de la generación</h1>

            <section class="generation-games-intro">
                <p id="generationGamesSubtitle">Conoce los juegos de esta generación de consolas</p>
            </section>

            <section id="generationGamesList" class="generation-games-list" aria-label="Juegos de la generación"></section>
        </main>

        <nav class="dashboard-nav" aria-label="Navegación principal">
            <button class="nav-item" type="button" data-page="dashboard.html" aria-label="Dashboard">
                <i class="ph ph-squares-four"></i>
            </button>
            <button class="nav-item active" type="button" data-page="generations.html" aria-label="Generaciones">
                <i class="ph ph-tree-structure"></i>
            </button>
            <button class="nav-item" type="button" aria-label="Perfil">
                <i class="ph ph-user-circle"></i>
            </button>
            <button class="nav-item" type="button" aria-label="Juegos">
                <i class="ph ph-game-controller"></i>
            </button>
            <button class="nav-item" type="button" aria-label="Personajes">
                <i class="ph ph-users"></i>
            </button>
        </nav>
    </div>
</body>

</html>
